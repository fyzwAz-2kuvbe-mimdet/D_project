# =====================================================================
# .streamlit/secrets.toml — 예시 파일 (절대 GitHub에 올리지 마세요!)
# =====================================================================

# [1] Google Gemini API Key
GEMINI_API_KEY = "AIzaSy_여기에_실제_키를_입력하세요"

# [2] Firebase 서비스 계정 정보
# Firebase Console > 프로젝트 설정 > 서비스 계정 > 새 비공개 키 생성
# 다운로드된 JSON 파일의 각 값을 아래에 복사하세요.
[firebase]
type                        = "service_account"
project_id                  = "your-project-id"
private_key_id              = "your-private-key-id"
# ↓ private_key는 반드시 큰따옴표로 감싸고 \n 을 그대로 포함해야 합니다!
private_key                 = "-----BEGIN PRIVATE KEY-----\nXXXXXXXX\n-----END PRIVATE KEY-----\n"
client_email                = "firebase-adminsdk-xxxx@your-project.iam.gserviceaccount.com"
client_id                   = "123456789"
auth_uri                    = "https://accounts.google.com/o/oauth2/auth"
token_uri                   = "https://oauth2.googleapis.com/token"
auth_provider_x509_cert_url = "https://www.googleapis.com/oauth2/v1/certs"
client_x509_cert_url        = "https://www.googleapis.com/robot/v1/metadata/x509/firebase-adminsdk-xxxx%40your-project.iam.gserviceaccount.com"
universe_domain             = "googleapis.com"
